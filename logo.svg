<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Warm Gold Gradient with userSpaceOnUse so it renders on vertical/horizontal lines -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EFC56A" />
      <stop offset="50%" stop-color="#D4A853" />
      <stop offset="100%" stop-color="#A37E36" />
    </linearGradient>
    
    <!-- Subtle Gold Glow -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Base Background Circle (Charcoal #1C1C1E) -->
  <circle cx="256" cy="256" r="240" fill="#1C1C1E" stroke="url(#goldGrad)" stroke-width="6" />
  
  <!-- Outer Decorative Ring -->
  <circle cx="256" cy="256" r="222" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.4" stroke-dasharray="8 6" />
  
  <!-- Monogram & Nodes Group -->
  <g filter="url(#goldGlow)">
    <!-- Connection Lines (H and K) -->
    <g stroke="url(#goldGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
      <!-- Left vertical stem of H -->
      <line x1="175" y1="150" x2="175" y2="362" />
      <!-- Middle shared stem (Right of H / Left of K) -->
      <line x1="265" y1="150" x2="265" y2="362" />
      <!-- Crossbar of H -->
      <line x1="175" y1="256" x2="265" y2="256" />
      <!-- Top diagonal of K -->
      <line x1="265" y1="256" x2="337" y2="150" />
      <!-- Bottom diagonal of K -->
      <line x1="265" y1="256" x2="337" y2="362" />
    </g>
    
    <!-- Terminal Nodes (Small Rotated Diamonds / Squares) -->
    <!-- Size 12x12, rotated 45 degrees -->
    <rect x="169" y="144" width="12" height="12" transform="rotate(45, 175, 150)" fill="url(#goldGrad)" />
    <rect x="169" y="356" width="12" height="12" transform="rotate(45, 175, 362)" fill="url(#goldGrad)" />
    <rect x="259" y="144" width="12" height="12" transform="rotate(45, 265, 150)" fill="url(#goldGrad)" />
    <rect x="259" y="356" width="12" height="12" transform="rotate(45, 265, 362)" fill="url(#goldGrad)" />
    <rect x="331" y="144" width="12" height="12" transform="rotate(45, 337, 150)" fill="url(#goldGrad)" />
    <rect x="331" y="356" width="12" height="12" transform="rotate(45, 337, 362)" fill="url(#goldGrad)" />
    
    <!-- Junction Nodes (Larger Rotated Diamonds / Squares) -->
    <!-- Size 18x18, rotated 45 degrees -->
    <rect x="166" y="247" width="18" height="18" transform="rotate(45, 175, 256)" fill="url(#goldGrad)" />
    <rect x="256" y="247" width="18" height="18" transform="rotate(45, 265, 256)" fill="url(#goldGrad)" stroke="#1C1C1E" stroke-width="2" />
  </g>
</svg>
